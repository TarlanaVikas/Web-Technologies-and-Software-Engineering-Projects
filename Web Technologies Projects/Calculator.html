<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functional Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        .calculator {
            width: 300px;
            background-color: #ccc;
            border: 1px solid #999;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        /* The Display Screen */
        #display {
            width: 100%;
            height: 60px;
            background-color: #bbb;
            border: none;
            text-align: right;
            padding: 10px;
            font-size: 24px;
            box-sizing: border-box;
            outline: none;
        }

        /* The Grid Layout */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background-color: #999;
            border-top: 1px solid #999;
        }

        button {
            height: 60px;
            border: none;
            background-color: #eee;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #ddd;
        }

        button:active {
            background-color: #bbb;
        }

        /* Styling for the top row functions */
        .special {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled>
    <div class="buttons">
        <button onclick="appendValue('(')">(</button>
        <button onclick="clearEntry()" class="special">CE</button>
        <button onclick="appendValue(')')">)</button>
        <button onclick="clearAll()" class="special">C</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('+')">+</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('-')">-</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('*')">x</button>

        <button onclick="appendValue('.')">.</button>
        <button onclick="appendValue('0')">0</button>
        <button onclick="calculate()">=</button>
        <button onclick="appendValue('/')">÷</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function appendValue(value) {
        display.value += value;
    }

    function clearAll() {
        display.value = '';
    }

    function clearEntry() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            // Using Function constructor instead of eval for better practice
            // It parses the string as a mathematical expression
            display.value = Function('"use strict";return (' + display.value + ')')();
        } catch (error) {
            display.value = "Error";
            setTimeout(clearAll, 1500);
        }
    }
</script>

</body>
</html>
