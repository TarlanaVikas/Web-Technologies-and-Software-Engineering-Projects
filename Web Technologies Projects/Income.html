<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxmann's Tax Calculator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f3f3f3;
        margin: 0;
        padding: 0;
    }
    .container {
        width: 600px;
        background: #fff;
        margin: 30px auto;
        border-radius: 6px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        overflow: hidden;
    }
    .header {
        background: #b30000;
        color: white;
        text-align: center;
        padding: 15px;
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 1px;
    }
    .tab {
        display: flex;
        background: #1f2c49;
        color: #fff;
    }
    .tab div {
        flex: 1;
        text-align: center;
        padding: 10px;
        font-weight: bold;
    }
    .step {
        padding: 12px 20px;
        border-bottom: 1px solid #ddd;
        background: #0a0a0a;
        color: #fff;
    }
    .step label {
        display: inline-block;
        width: 200px;
    }
    .step input, .step select {
        padding: 5px;
        width: 180px;
        border: none;
        outline: none;
        border-radius: 3px;
    }
    .calc-section {
        background: #b30000;
        color: #fff;
        text-align: center;
        font-weight: bold;
        padding: 8px;
    }
    .result {
        background: #fff;
        border-top: 1px solid #ccc;
    }
    .result-row {
        display: flex;
        justify-content: space-between;
        padding: 10px 20px;
        border-bottom: 1px solid #eee;
    }
    .reset {
        text-align: center;
        padding: 10px;
    }
    .reset button {
        background: #b30000;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 3px;
        cursor: pointer;
    }
    footer {
        text-align: center;
        padding: 15px;
        font-size: 13px;
        color: #333;
    }
    footer a {
        color: #0077cc;
        text-decoration: none;
    }
</style>
</head>
<body>
<div class="container">
    <div class="header">TAXMANN'S</div>
    <div class="tab">
        <div> TAX CALCULATOR</div>
        <div> INCOME & TAX CALCULATOR</div>
    </div>
    <div class="step">
        <label>Step 1: Assessment Year</label>
        <select id="year">
            <option>2020-21</option>
            <option>2021-22</option>
            <option>2022-23</option>
            <option>2023-24</option>
        </select>
    </div>
    <div class="step">
        <label>Step 2: Tax Payer</label>
        <select id="payer">
            <option>Individual</option>
            <option>HUF</option>
            <option>Company</option>
            <option>Firm</option>
        </select>
    </div>
    <div class="step">
        <label>Step 3: Male / Female / Senior Citizen</label>
        <select id="gender">
            <option>Male</option>
            <option>Female</option>
            <option>Senior Citizen</option>
        </select>
    </div>
    <div class="step">
        <label>Step 4: Residential Status</label>
        <select id="status">
            <option>Resident</option>
            <option>Non-Resident</option>
        </select>
    </div>
    <div class="step">
        <label>Step 5: Net Taxable Income</label>
        <input type="number" id="income" placeholder="Enter amount ₹">
    </div>

    <div class="calc-section">YOUR TAX COMPUTATION</div>
    <div class="result">
        <div class="result-row"><span>Income Tax</span><span id="tax">₹0</span></div>
        <div class="result-row"><span>Surcharge</span><span id="surcharge">₹0</span></div>
        <div class="result-row"><span>Health and Education Cess @ 4%</span><span id="cess">₹0</span></div>
        <div class="result-row" style="font-weight:bold;"><span>Total Tax Liability</span><span id="total">₹0</span></div>
    </div>

    <div class="reset">
        <button onclick="calculateTax()">Calculate</button>
        <button onclick="resetForm()">Reset</button>
    </div>

    <footer>
        As per Finance (No. 2) Bill, 2019<br>
        Supported by <a href="https://www.taxmann.com" target="_blank">www.taxmann.com</a>
    </footer>
</div>

<script>
function calculateTax() {
    const income = parseFloat(document.getElementById('income').value) || 0;
    let tax = 0;

    if (income <= 400000) {
        tax = 0;
    } else if (income <= 700000) {
        tax = (income - 400000) * 0.05;
    } else if (income <= 1000000) {
        tax = 12500 + (income - 700000) * 0.15;
    } else {
        tax = 110000 + (income - 1000000) * 0.25;
    }

    let surcharge = 0;
    if (income > 5000000 && income <= 10000000) surcharge = tax * 0.1;
    else if (income > 10000000) surcharge = tax * 0.15;

    const cess = (tax + surcharge) * 0.04;
    const total = tax + surcharge + cess;

    document.getElementById('tax').innerText = "₹" + tax.toLocaleString();
    document.getElementById('surcharge').innerText = "₹" + surcharge.toLocaleString();
    document.getElementById('cess').innerText = "₹" + cess.toLocaleString();
    document.getElementById('total').innerText = "₹" + total.toLocaleString();
}

function resetForm() {
    document.getElementById('income').value = '';
    document.getElementById('tax').innerText = '₹0';
    document.getElementById('surcharge').innerText = '₹0';
    document.getElementById('cess').innerText = '₹0';
    document.getElementById('total').innerText = '₹0';
}
</script>

</body>
</html>
